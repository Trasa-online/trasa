<!doctype html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>trasa - wkrótce</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100dvh;
      background: #FEFEFE;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    .orb {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #fb923c, #ea580c 60%, #c2410c);
    }
    h1 {
      font-size: 2rem;
      font-weight: 900;
      color: #0E0E0E;
      letter-spacing: -0.02em;
    }
    p {
      font-size: 1rem;
      color: #979797;
      text-align: center;
      max-width: 28ch;
      line-height: 1.5;
    }
  </style>
</head>
<body>
  <div class="orb"></div>
  <h1>trasa</h1>
  <p>Pracujemy nad czymś fajnym. Wróć wkrótce.</p>
</body>
</html>
